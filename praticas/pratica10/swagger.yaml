openapi: 3.0.0

info:
  title: Minha API REST
  version: "0.1"
  description: Documentação da API REST criada na prática 10.

servers:
  - url: http://localhost:3000/

tags:
  - name: usuarios
    description: Operações relacionadas aos usuários

paths:
  /usuarios:
    post:
      tags:
        - usuarios
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                senha:
                  type: string
              required:
                - email
                - senha
      responses:
        "201":
          description: Usuário criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        "422":
          description: Requisição inválida
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg:
                    type: string
                example:
                  msg: "Email e Senha são obrigatórios"

    delete:
      tags:
        - usuarios
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Usuário deletado com sucesso
          content: {}

  /usuarios/login:
    post:
      tags:
        - usuarios
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                usuario:
                  type: string
                senha:
                  type: string
              required:
                - usuario
                - senha
      responses:
        "200":
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        "401":
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mensagem'

  /usuarios/renovar:
    post:
      tags:
        - usuarios
      security:
        - JWTAuth: []
      responses:
        "200":
          description: Token renovado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mensagem'
        "401":
          description: Token inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mensagem'

components:
  schemas:
    Usuario:
      type: object
      properties:
        email:
          type: string
        senha:
          type: string

    Mensagem:
      type: object
      properties:
        msg:
          type: string

  securitySchemes:
    JWTAuth:
      type: apiKey
      in: header
      name: authorization
